<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV SCANNER · Pokémon GO Appraisal Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05070f;
  --ink:#dbe7ff;
  --muted:#5f7099;
  --line:rgba(99,140,210,.16);
  --glass:rgba(16,24,46,.55);
  --cyan:#27e0e8;
  --magenta:#f06ad6;
  /* tier accents */
  --hundo:#ffd24a;
  --excellent:#37e29a;
  --great:#34b4ff;
  --decent:#ffc24b;
  --poor:#ff5d6c;
  --accent:var(--great);
  /* barras de IV estilo Pokémon GO: vermelho fixo, como a appraisal do jogo */
  --iv-track:rgba(120,140,175,.15);
  --iv-bar-hi:#ff7363;
  --iv-bar-lo:#e5392b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"JetBrains Mono",monospace;
  color:var(--ink);
  background:var(--bg);
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:32px 18px;
  overflow-x:hidden;
  position:relative;
}
/* atmospheric background: gradient mesh + glows */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(60% 50% at 78% 18%, rgba(240,106,214,.18), transparent 60%),
    radial-gradient(55% 55% at 12% 82%, rgba(39,224,232,.16), transparent 60%),
    radial-gradient(120% 120% at 50% 0%, #0a1024 0%, #05070f 55%, #03040a 100%);
}
/* scanline + grain overlay */
body::after{
  content:"";position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.5;
  background:repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;
}

.terminal{
  position:relative;z-index:2;
  width:min(960px,100%);
  background:linear-gradient(180deg, rgba(20,30,56,.72), rgba(9,14,30,.78));
  border:1px solid var(--line);
  border-radius:22px;
  padding:30px clamp(20px,4vw,40px) 36px;
  box-shadow:
    0 0 0 1px rgba(39,224,232,.06),
    0 40px 120px -40px rgba(0,0,0,.9),
    inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter:blur(14px);
  animation:rise .8s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:none}}

/* corner brackets */
.terminal::before,.terminal::after{
  content:"";position:absolute;width:26px;height:26px;border:2px solid var(--cyan);opacity:.35;
}
.terminal::before{top:14px;left:14px;border-right:0;border-bottom:0;border-top-left-radius:8px}
.terminal::after{bottom:14px;right:14px;border-left:0;border-top:0;border-bottom-right-radius:8px}

header{display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:22px}
.brand{
  font-family:"Chakra Petch",sans-serif;font-weight:700;
  font-size:clamp(28px,5vw,44px);letter-spacing:.16em;
  background:linear-gradient(92deg,var(--cyan),var(--magenta));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 36px rgba(39,224,232,.25);
}
.sub{font-size:11px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase}
.status{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.2em;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--excellent);box-shadow:0 0 10px var(--excellent);animation:blink 1.8s infinite}
@keyframes blink{50%{opacity:.35}}

/* search */
.search{position:relative;margin-bottom:26px}
.search-field{display:flex;align-items:center;gap:12px;
  background:rgba(6,11,24,.7);border:1px solid var(--line);border-radius:13px;padding:0 16px;
  transition:border-color .25s, box-shadow .25s}
.search-field:focus-within{border-color:rgba(39,224,232,.55);box-shadow:0 0 0 4px rgba(39,224,232,.08)}
.search-field svg{flex:0 0 auto;opacity:.6}
#search{flex:1;background:none;border:0;outline:none;color:var(--ink);
  font-family:"Chakra Petch",sans-serif;font-size:18px;letter-spacing:.04em;padding:16px 0}
#search::placeholder{color:var(--muted)}
kbd{font-family:"JetBrains Mono";font-size:10px;color:var(--muted);border:1px solid var(--line);
  border-radius:5px;padding:3px 7px;letter-spacing:.05em}

#results{position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:30;
  background:rgba(9,15,32,.97);border:1px solid var(--line);border-radius:13px;
  max-height:300px;overflow-y:auto;padding:6px;display:none;
  box-shadow:0 30px 70px -30px rgba(0,0,0,.9);backdrop-filter:blur(8px)}
#results.open{display:block}
#results li{list-style:none;display:flex;align-items:center;gap:12px;
  padding:11px 13px;border-radius:9px;cursor:pointer;transition:background .12s}
#results li:hover,#results li.active{background:rgba(39,224,232,.1)}
#results .rid{font-size:11px;color:var(--muted);min-width:42px}
#results .rname{font-family:"Chakra Petch",sans-serif;font-weight:600;letter-spacing:.03em}
#results .rtypes{margin-left:auto;display:flex;gap:5px}
#results .empty{padding:16px 13px;color:var(--muted);font-size:13px}
.tchip{font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:20px;
  border:1px solid currentColor;opacity:.9}
#results::-webkit-scrollbar{width:8px}
#results::-webkit-scrollbar-thumb{background:rgba(99,140,210,.25);border-radius:8px}

/* readout grid */
.readout{display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(20px,4vw,40px);
  opacity:.32;filter:grayscale(.5);transition:opacity .4s, filter .4s}
.readout.live{opacity:1;filter:none}
@media(max-width:680px){.readout{grid-template-columns:1fr}}

.subject{display:flex;flex-direction:column}
.subject-head{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.poke-id{font-size:13px;color:var(--muted);letter-spacing:.1em}
.types{display:flex;gap:6px;margin-left:auto}
.poke-name{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:clamp(26px,4vw,38px);
  letter-spacing:.05em;line-height:1.05;margin-bottom:20px;
  text-shadow:0 0 30px color-mix(in srgb, var(--accent) 40%, transparent)}

/* IV rows */
.iv-row{margin-bottom:18px}
.iv-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
.iv-label{font-size:12px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
.iv-val{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:20px;color:var(--accent);
  min-width:48px;text-align:right}
.iv-val small{color:var(--muted);font-size:12px;font-weight:500}

.iv-seg{display:flex;gap:2px;margin-bottom:10px;height:18px;padding:2px;border-radius:11px;
  background:rgba(8,13,28,.5);border:1px solid rgba(120,140,175,.12)}
.iv-seg span{flex:1;background:var(--iv-track);transition:background .18s, box-shadow .18s}
.iv-seg span:first-child{border-radius:8px 0 0 8px}
.iv-seg span:last-child{border-radius:0 8px 8px 0}
.iv-seg span.on{background:linear-gradient(180deg,var(--iv-bar-hi),var(--iv-bar-lo));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.28)}
.iv-seg.max span.on{background:linear-gradient(180deg,#ffa24d,#ff4d2b);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 0 10px rgba(255,90,45,.55)}

input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:5px;
  background:rgba(99,140,210,.18);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:#f2493c;border:3px solid #05070f;cursor:grab;
  box-shadow:0 0 0 3px rgba(242,73,60,.35),0 0 16px rgba(242,73,60,.6);
  transition:transform .15s}
input[type=range]::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#f2493c;
  border:3px solid #05070f;cursor:grab}

.total{margin-top:24px;display:flex;align-items:baseline;gap:10px;
  border-top:1px dashed var(--line);padding-top:16px}
.total .lbl{font-size:11px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase}
.total .num{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:24px;margin-left:auto}
.total .num b{color:var(--accent)}

/* gauge panel */
.gauge-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 35%, rgba(39,224,232,.07), transparent 70%);
  border-radius:16px;padding:10px}
.gauge-wrap{position:relative;width:230px;max-width:62vw;aspect-ratio:1}
.gauge-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.gauge-bg{fill:none;stroke:rgba(99,140,210,.14);stroke-width:13}
.gauge-fg{fill:none;stroke:var(--accent);stroke-width:13;stroke-linecap:round;
  transition:stroke-dashoffset .7s cubic-bezier(.2,.8,.2,1), stroke .4s;
  filter:drop-shadow(0 0 10px color-mix(in srgb,var(--accent) 70%,transparent))}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-pct{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:46px;line-height:1;
  color:#fff;text-shadow:0 0 26px color-mix(in srgb,var(--accent) 60%,transparent)}
.gauge-pct .sym{font-size:22px;color:var(--accent)}
.gauge-tier{margin-top:6px;font-size:12px;letter-spacing:.34em;color:var(--accent);text-transform:uppercase}
.stars{display:flex;gap:6px;margin-top:18px}
.stars span{width:13px;height:13px;clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  background:rgba(99,140,210,.2);transition:background .25s}
.stars span.on{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.verdict{margin-top:16px;font-size:11px;letter-spacing:.06em;color:var(--muted);text-align:center;
  max-width:230px;line-height:1.5}

/* hundo celebration */
.terminal.hundo{box-shadow:0 0 0 1px rgba(255,210,74,.3),0 0 90px -10px rgba(255,210,74,.5),0 40px 120px -40px #000}
.gauge-panel.hundo .gauge-pct{animation:hundopulse 1s ease infinite}
@keyframes hundopulse{50%{transform:scale(1.06);text-shadow:0 0 44px var(--hundo)}}
.spark{position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:50%;
  background:var(--hundo);pointer-events:none;opacity:0}
.gauge-panel.hundo .spark{animation:burst 1.1s ease-out forwards}
@keyframes burst{0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}100%{opacity:0;
  transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1)}}

.footer{margin-top:26px;text-align:center;font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}
.footer b{color:var(--cyan)}
</style>
</head>
<body>
<main class="terminal" id="terminal">
  <header>
    <div>
      <div class="brand">IV SCANNER</div>
      <div class="sub">Appraisal Terminal</div>
    </div>
    <div class="status"><span class="dot"></span><span id="count">— espécies</span></div>
  </header>

  <div class="search">
    <div class="search-field">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Buscar Pokémon…" autocomplete="off" spellcheck="false">
      <kbd>↑↓ ↵</kbd>
    </div>
    <ul id="results"></ul>
  </div>

  <section class="readout" id="readout">
    <div class="subject">
      <div class="subject-head">
        <span class="poke-id" id="pid">#000</span>
        <span class="types" id="types"></span>
      </div>
      <div class="poke-name" id="pname">SELECIONE UM POKÉMON</div>

      <div class="iv-row" data-stat="atk">
        <div class="iv-head"><span class="iv-label">Ataque</span><span class="iv-val" id="v-atk">0<small>/15</small></span></div>
        <div class="iv-seg" id="seg-atk"></div>
        <input type="range" min="0" max="15" value="0" id="s-atk">
      </div>
      <div class="iv-row" data-stat="def">
        <div class="iv-head"><span class="iv-label">Defesa</span><span class="iv-val" id="v-def">0<small>/15</small></span></div>
        <div class="iv-seg" id="seg-def"></div>
        <input type="range" min="0" max="15" value="0" id="s-def">
      </div>
      <div class="iv-row" data-stat="sta">
        <div class="iv-head"><span class="iv-label">Vida</span><span class="iv-val" id="v-sta">0<small>/15</small></span></div>
        <div class="iv-seg" id="seg-sta"></div>
        <input type="range" min="0" max="15" value="0" id="s-sta">
      </div>

      <div class="total"><span class="lbl">IV Total</span><span class="num"><b id="tnum">0</b> / 45</span></div>
    </div>

    <div class="gauge-panel" id="gpanel">
      <div class="gauge-wrap">
        <svg viewBox="0 0 200 200">
          <circle class="gauge-bg" cx="100" cy="100" r="86"/>
          <circle class="gauge-fg" id="arc" cx="100" cy="100" r="86"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-pct"><span id="pct">0</span><span class="sym">%</span></div>
          <div class="gauge-tier" id="tier">—</div>
        </div>
        <span class="spark" style="--dx:-70px;--dy:-50px"></span>
        <span class="spark" style="--dx:80px;--dy:-40px"></span>
        <span class="spark" style="--dx:-60px;--dy:60px"></span>
        <span class="spark" style="--dx:70px;--dy:65px"></span>
        <span class="spark" style="--dx:0px;--dy:-90px"></span>
      </div>
      <div class="stars" id="stars"><span></span><span></span><span></span><span></span></div>
      <div class="verdict" id="verdict">Arraste os controles ou digite os IVs (0–15).</div>
    </div>
  </section>

  <div class="footer">Dataset local · <b>pokemon.csv</b> · cálculo = (atk+def+vida) / 45</div>
</main>

<script>
const TYPE_COLORS={Normal:"#9098a1",Fire:"#ff6b3d",Water:"#4a90ff",Electric:"#ffcb2e",Grass:"#46c763",
Ice:"#74d3e3",Fighting:"#e0405a",Poison:"#a956d6",Ground:"#e0a44a",Flying:"#8fa9ff",Psychic:"#ff5b94",
Bug:"#9fc832",Rock:"#c8b878",Ghost:"#7860c8",Dragon:"#6a52ff",Dark:"#6b5a52",Steel:"#7f9ab0",Fairy:"#ff8fd0"};

const TIERS=[
  {min:100,name:"HUNDO",color:"--hundo",stars:4,msg:"Perfeito. 15/15/15 — um HUNDO de verdade."},
  {min:80, name:"EXCELENTE",color:"--excellent",stars:4,msg:"IV de topo. Guarda esse."},
  {min:67, name:"ÓTIMO",color:"--great",stars:3,msg:"Muito bom para batalhas."},
  {min:51, name:"BOM",color:"--decent",stars:2,msg:"Aceitável. Dá pro gasto."},
  {min:0,  name:"FRACO",color:"--poor",stars:1,msg:"IV baixo. Transfere ou usa em trocas."},
];

const $=id=>document.getElementById(id);
const C=2*Math.PI*86;            // circunferência da gauge
$("arc").style.strokeDasharray=C;
$("arc").style.strokeDashoffset=C;

let POKEMON=[],active=-1,selected=null;

function chip(t){const c=TYPE_COLORS[t]||"#8fa9ff";return `<span class="tchip" style="color:${c}">${t}</span>`;}

// build 15 segments per stat
["atk","def","sta"].forEach(s=>{
  const seg=$("seg-"+s);
  for(let i=0;i<15;i++) seg.appendChild(document.createElement("span"));
});

function tierFor(p){return TIERS.find(t=>p>=t.min);}

function render(){
  const a=+$("s-atk").value,d=+$("s-def").value,s=+$("s-sta").value;
  [["atk",a],["def",d],["sta",s]].forEach(([k,v])=>{
    $("v-"+k).innerHTML=v+"<small>/15</small>";
    [...$("seg-"+k).children].forEach((el,i)=>el.classList.toggle("on",i<v));
    $("seg-"+k).classList.toggle("max",v===15);
  });
  const total=a+d+s, pct=Math.round((total/45)*1000)/10;
  const tier=tierFor(pct);
  document.documentElement.style.setProperty("--accent","var("+tier.color+")");

  $("tnum").textContent=total;
  $("pct").textContent=Number.isInteger(pct)?pct:pct.toFixed(1);
  $("tier").textContent=tier.name;
  $("verdict").textContent=tier.msg;
  $("arc").style.strokeDashoffset=C*(1-pct/100);
  [...$("stars").children].forEach((el,i)=>el.classList.toggle("on",i<tier.stars));

  const hundo=pct===100;
  $("terminal").classList.toggle("hundo",hundo);
  const gp=$("gpanel");
  if(hundo && !gp.classList.contains("hundo")){gp.classList.add("hundo");}
  else if(!hundo){gp.classList.remove("hundo");}
}

["s-atk","s-def","s-sta"].forEach(id=>$(id).addEventListener("input",render));

// ---- autocomplete ----
const results=$("results"),search=$("search");

function selectPokemon(p){
  selected=p;
  search.value=p.name;
  $("pid").textContent="#"+String(p.id).padStart(3,"0");
  $("pname").textContent=p.name.toUpperCase();
  $("types").innerHTML=p.types.map(chip).join("");
  $("readout").classList.add("live");
  closeList();
  search.blur();
}

function renderList(items){
  if(!items.length){results.innerHTML='<li class="empty">Nenhum Pokémon encontrado.</li>';results.classList.add("open");return;}
  results.innerHTML=items.map((p,i)=>
    `<li data-i="${i}"><span class="rid">#${String(p.id).padStart(3,"0")}</span>
     <span class="rname">${p.name}</span>
     <span class="rtypes">${p.types.map(chip).join("")}</span></li>`).join("");
  results.classList.add("open");
  [...results.children].forEach((li,i)=>li.addEventListener("click",()=>selectPokemon(items[i])));
  active=-1;
}
function closeList(){results.classList.remove("open");active=-1;}

let filtered=[];
search.addEventListener("input",()=>{
  const q=search.value.trim().toLowerCase();
  if(!q){closeList();return;}
  filtered=POKEMON.filter(p=>p.name.toLowerCase().includes(q)).slice(0,60);
  renderList(filtered);
});
search.addEventListener("focus",()=>{if(search.value.trim()&&filtered.length)results.classList.add("open");});
search.addEventListener("keydown",e=>{
  const items=[...results.querySelectorAll("li[data-i]")];
  if(e.key==="ArrowDown"){e.preventDefault();active=Math.min(active+1,items.length-1);}
  else if(e.key==="ArrowUp"){e.preventDefault();active=Math.max(active-1,0);}
  else if(e.key==="Enter"){e.preventDefault();if(active>=0&&filtered[active])selectPokemon(filtered[active]);else if(filtered.length===1)selectPokemon(filtered[0]);return;}
  else if(e.key==="Escape"){closeList();return;}
  else return;
  items.forEach((li,i)=>li.classList.toggle("active",i===active));
  if(items[active])items[active].scrollIntoView({block:"nearest"});
});
document.addEventListener("click",e=>{if(!e.target.closest(".search"))closeList();});

// ---- load dataset ----
fetch("pokemon.json").then(r=>r.json()).then(data=>{
  POKEMON=data;
  $("count").textContent=data.length+" espécies";
}).catch(()=>{$("count").textContent="erro ao carregar";});

render();
</script>
</body>
</html>
